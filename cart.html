<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartEdge TECH | Cart</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .cart-page {
            max-width: 820px;
            margin: 0 auto;
            padding: 44px 5% 80px;
        }

        .cart-heading {
            font-size: 1.4rem;
            font-weight: 400;
            color: #e0e0e0;
            margin-bottom: 6px;
        }

        .cart-meta {
            font-size: 0.82rem;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .cart-empty {
            text-align: center;
            padding: 72px 0;
            color: var(--text-dim);
            font-size: 0.88rem;
            line-height: 2;
        }

        .cart-empty a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(46,184,194,0.3);
            padding-bottom: 1px;
            transition: border-color 0.2s;
        }

        .cart-empty a:hover { border-color: var(--accent); }

        .cart-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            transition: border-color 0.2s;
        }

        .cart-item:hover { border-color: rgba(46,184,194,0.15); }

        .cart-item-info { flex: 1; min-width: 0; }

        .cart-item-name {
            font-size: 0.88rem;
            color: #d0d0d0;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-item-price {
            font-size: 0.8rem;
            color: var(--accent);
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-dim);
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
            line-height: 1;
        }

        .qty-btn:hover { border-color: var(--accent); color: var(--accent); }

        .qty-num {
            font-size: 0.85rem;
            color: var(--text-main);
            min-width: 22px;
            text-align: center;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: color 0.2s;
        }

        .remove-btn:hover { color: #c06060; }

        .cart-summary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 22px 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.84rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .summary-row.total {
            border-top: 1px solid var(--border);
            padding-top: 14px;
            margin-top: 6px;
            margin-bottom: 0;
            font-size: 0.92rem;
            color: #e0e0e0;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }

        .checkout-btn:hover { opacity: 0.85; }

        .clear-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .clear-btn:hover { border-color: #c06060; color: #c06060; }

        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #0e1118;
            border: 1px solid var(--border);
            color: #d8d8d8;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            padding: 12px 18px;
            border-radius: 7px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <a href="hompage.html">SmartEdge <span>TECH</span></a>
        </div>
        <nav class="header-nav">
            <a href="hompage.html">Home</a>
            <a href="audio.html">Audio</a>
            <a href="laptops.html">Laptops</a>
            <a href="smartphones.html">Smartphones</a>
            <a href="accessories.html">Accessories</a>
            <a href="about.html">About</a>
            <a href="cart.html" class="nav-active">Cart <span class="cart-count">0</span></a>
        </nav>
    </header>

    <div class="cart-page">
        <h1 class="cart-heading">Your Cart</h1>
        <p class="cart-meta" id="cartMeta">Loading...</p>

        <div id="cartEmpty" class="cart-empty" style="display:none">
            Your cart is empty.<br>
            <a href="hompage.html">Continue browsing</a>
        </div>

        <div id="cartContent" style="display:none">
            <div class="cart-list" id="cartList"></div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">—</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span>KES 300</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="totalAmt">—</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                <button class="clear-btn" id="clearBtn">Clear Cart</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
    const DELIVERY = 300;

    function getCart() {
        return JSON.parse(sessionStorage.getItem('cart') || '[]');
    }

    function saveCart(cart) {
        sessionStorage.setItem('cart', JSON.stringify(cart));
    }

    function parsePrice(str) {
        return parseInt((str || '').replace(/[^0-9]/g, ''), 10) || 0;
    }

    function fmt(n) {
        return 'KES ' + n.toLocaleString('en-KE');
    }

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        clearTimeout(t._t);
        t._t = setTimeout(() => { t.style.opacity = '0'; }, 2200);
    }

    function updateBadge(cart) {
        const total = cart.reduce((s, i) => s + (i.qty || 1), 0);
        document.querySelectorAll('.cart-count').forEach(el => { el.textContent = total; });
    }

    function render() {
        const cart = getCart();
        const meta = document.getElementById('cartMeta');
        const empty = document.getElementById('cartEmpty');
        const content = document.getElementById('cartContent');
        const list = document.getElementById('cartList');

        updateBadge(cart);

        if (cart.length === 0) {
            meta.textContent = '0 items';
            empty.style.display = 'block';
            content.style.display = 'none';
            return;
        }

        const totalQty = cart.reduce((s, i) => s + (i.qty || 1), 0);
        meta.textContent = totalQty + ' item' + (totalQty !== 1 ? 's' : '');
        empty.style.display = 'none';
        content.style.display = 'block';

        list.innerHTML = '';
        let subtotal = 0;

        cart.forEach((item, idx) => {
            const unit = parsePrice(item.price);
            const qty = item.qty || 1;
            subtotal += unit * qty;

            const row = document.createElement('div');
            row.className = 'cart-item';
            row.innerHTML = `
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">${fmt(unit * qty)}</div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" data-idx="${idx}" data-action="dec">−</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" data-idx="${idx}" data-action="inc">+</button>
                </div>
                <button class="remove-btn" data-idx="${idx}">Remove</button>
            `;
            list.appendChild(row);
        });

        document.getElementById('subtotal').textContent = fmt(subtotal);
        document.getElementById('totalAmt').textContent = fmt(subtotal + DELIVERY);

        list.querySelectorAll('.qty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const c = getCart();
                const i = parseInt(btn.dataset.idx);
                if (btn.dataset.action === 'inc') {
                    c[i].qty = (c[i].qty || 1) + 1;
                } else {
                    c[i].qty = (c[i].qty || 1) - 1;
                    if (c[i].qty < 1) c[i].qty = 1;
                }
                saveCart(c);
                render();
            });
        });

        list.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const c = getCart();
                const removed = c.splice(parseInt(btn.dataset.idx), 1);
                saveCart(c);
                toast(removed[0].name + ' removed');
                render();
            });
        });
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
        saveCart([]);
        toast('Cart cleared');
        render();
    });

    document.getElementById('checkoutBtn').addEventListener('click', () => {
        toast('Checkout coming soon');
    });

    render();
    </script>

</body>
</html>
